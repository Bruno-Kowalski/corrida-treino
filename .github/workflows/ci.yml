name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-backend:
    name: Backend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Display Java version
        run: java -version

      - name: Executar Checkstyle (Linting)
        working-directory: ./backend
        run: mvn checkstyle:check

      - name: Executar SpotBugs (Bug Detection)
        working-directory: ./backend
        run: mvn spotbugs:check

      - name: Executar testes
        working-directory: ./backend
        run: mvn test -DskipTests=false

      - name: Build do projeto
        working-directory: ./backend
        run: mvn package -DskipTests

      - name: Gerar relatório de cobertura
        working-directory: ./backend
        run: mvn jacoco:report
        continue-on-error: true

  build-frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Display Node version
        run: node --version && npm --version

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm ci

      - name: Executar ESLint (Linting)
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Executar testes
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
        continue-on-error: true

      - name: Build produção
        working-directory: ./frontend
        run: npm run build

      - name: Verificar tamanho do build
        working-directory: ./frontend
        run: du -sh build/

  quality-gate:
    name: Quality Gate
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check se todos os builds passaram
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ] || [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "❌ Build ou testes falharam!"
            exit 1
          fi
          echo "✅ Todos os testes passaram com sucesso!"
