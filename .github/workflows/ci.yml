name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, entrega-intermediaria]
  pull_request:
    branches: [main, develop]

jobs:
  build-backend:
    name: Backend Build & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: db_pacex
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 22501077
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Instalar e Testar Backend
        working-directory: ./backend
        run: mvn clean install -DskipTests=false
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/db_pacex
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 22501077
          JWT_SECRET: 3cF7gK9mN2pQ5rT8vX1yA4bD6eH0jL3nP6qS9uW2zA5cE8fI1kM4oR7tV0xY3z
          JWT_EXPIRATION: 86400000

      - name: Gerar relatório de cobertura
        working-directory: ./backend
        run: mvn jacoco:report
        continue-on-error: true

  build-frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm ci

      - name: Executar Linting
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Executar testes
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build produção
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Verificar tamanho do build
        working-directory: ./frontend
        run: du -sh build/

  quality-gate:
    name: Quality Gate
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check status final
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ] || [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "❌ Build ou testes falharam!"
            exit 1
          fi
          echo "✅ Pipeline finalizada com sucesso!"
